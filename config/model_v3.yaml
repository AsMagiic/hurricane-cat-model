  physics:
    rmax_method:
      value: "vickery_wadhera"
      units: "switch"
      source: "Rmax sampling method: 'uniform' — v2 legacy (rng.uniform(30,55) km, bit-identical baseline); 'vickery_wadhera' — V&W (2008) ERDC TR-08-06 eq. (13). See model/hazard.py."
    b_method:
      value: "vickery_wadhera"
      units: "switch"
      source: "Holland B sampling method: 'constant' — placeholder 0.0; 'vickery_wadhera' — V&W (2008) ERDC TR-08-06 eq. (14). See model/hazard.py."
    wind_profile:
      value: "holland"
      units: "switch"
      source: "Radial wind profile: 'rankine' — modified Rankine vortex (v2 placeholder); 'holland' — Holland (1980) full gradient-balance profile Vg(r)=sqrt((B/rho)*x*dp*exp(-x)+(rf/2)^2)-rf/2, x=(Rmax/r)^B, anchored to Vmax at r=Rmax. Requires b_method != 'constant' (b=0 gives flat Vmax field). See model/wind_field.py."
    air_density_kg_m3:
      value: 1.15
      units: "kg/m^3"
      source: "Standard tropical marine boundary layer density (NHC/SLOSH, 1.15 kg/m³ at sea level 25°C). Used in Holland (1980) gradient-wind pressure term: (B/rho)*x*dp_pa*exp(-x). See model/wind_field.py."
    translation_asymmetry:
      value: "on"
      units: "switch"
      source: "Paso 2.2. Schwerdt-Ho-Watkins (1979) / HAZUS-MH Hurricane Technical Manual (FEMA 2012) forward-motion asymmetry: V_total = max(0, V_sym + a*Vt_mph*sin(beta_loc - beta_heading)). 'on'/'off'. Default 'off' for backward compatibility; with 'off', output is bit-identical to the symmetric Holland baseline. See model/wind_field.py."
    asymmetry_fraction:
      value: 0.5
      units: "dimensionless"
      source: "Paso 2.2. Surface-level asymmetry fraction a in V_total = V_sym + a*Vt_mph*sin(beta_loc - beta_heading). a=0.5 is the boundary-layer-reduced value (Powell 1980 observations, consistent with HAZUS-MH Hurricane Technical Manual FEMA 2012); full gradient-wind asymmetry is a=1.0 (Schwerdt-Ho-Watkins 1979 SPH original). See model/wind_field.py."
    decay_method:
      value: "kaplan_demaria"
      units: "switch"
      source: "Paso 2.3. Post-landfall intensity decay. 'efold': v2 e-folding decay (efold_km=120 km, vt-independent, bit-identical v2 baseline); 'kaplan_demaria': Kaplan & DeMaria (1995) J. Appl. Meteor. 34 2499-2512, coefficients per DeMaria et al. (2006) JAMC 45(3): V(t)=Vb+(V0-Vb)*exp(-alpha*t), t=cum_dist/vt_kmh. Default 'kaplan_demaria'. See model/hazard.py."
    intensity_cap:
      value: "on"
      units: "switch"
      source: "Step 3.0a. Upper truncation of landfall intensity distribution at intensity.cap_kt. 'off': unbounded above, bit-identical to pre-3.0a v3 baseline (_INT_P_UB=1.0, same float expression). 'on': renormalized truncation; _INT_P_UB=Phi((ln(cap_kt)-mu_log)/sigma_log)~0.9961, so p_samp in [_INT_P_LB, _INT_P_UB]. Env-var override: CATMODEL_INTENSITY_CAP. See model/hazard.py."
    wpr_residual:
      value: "off"
      units: "switch"
      source: "Step 3.0b. Stochastic WPR scatter: Δp = a·Vmax^b · exp(ε), ε ~ N(0, sigma_log²), sigma_log from wind_pressure.sigma_log (0.2458). 'off': deterministic Δp = a·Vmax^b, bit-identical to v3+3.0a baseline (Rmax/B streams unaffected; spawn architecture unchanged). 'on': adds lognormal multiplicative noise on Δp, propagating into Rmax and B via the V&W causal chain. Jensen bias: E[exp(ε)] = exp(sigma_log²/2) ≈ 1.031, so mean Δp shifts +3% upward (mean Rmax slightly smaller, tail fattened). Does NOT touch the Holland amplitude (anchored to Vmax, Phase-2 decision). Ships off by default. Env-var override: CATMODEL_WPR_RESIDUAL. See model/hazard.py."
    rmax_floor:
      value: "on"
      units: "switch"
      source: "Step 3.0c. Physical Rmax floor for V&W Rmax sampling. 'off': no floor applied, bit-identical to post-3.0b baseline (4 sub-physical storms under wpr=off, 153 under wpr=on). 'on': Rmax = max(Rmax_vw, rmax_floor_km) applied after _vw_rmax_sample and before _vw_b_sample — B couples to physical Rmax, not sub-physical extrapolation. Censoring (clip), not renormalization: sub-physical storms are near-zero-loss compact near-misses (loss trivially small), so an atom at 8 km introduces no material metric distortion. No new RNG draws consumed; floor=off is bit-identical to post-3.0b baseline. Default 'on'; prerequisite for wpr_residual='on' production readiness. Env-var override: CATMODEL_RMAX_FLOOR. See model/hazard.py."
    kd_alpha:
      value: 0.095
      units: "h^-1"
      source: "Paso 2.3. Kaplan & DeMaria (1995) / DeMaria et al. (2006): exponential decay rate in V(t)=Vb+(V0-Vb)*exp(-alpha*t). See model/hazard.py."
    kd_vb_kt:
      value: 26.7
      units: "kt"
      source: "Paso 2.3. Kaplan & DeMaria (1995): residual background wind. Converted to mph at module load (x1.15078 mph/kt). See model/hazard.py."
    vt_min_kmh:
      value: 2.0
      units: "km/h"
      source: "Paso 2.3. Translation-speed floor for K-D time computation t=cum_dist/vt. Guards gamma-tail near-zero draws against divide-by-zero; 2 km/h (~1.1 kt) is physically near-stationary — decay toward Vb at this speed is correct behavior. Not applied on the efold path. See model/hazard.py."

vickery_wadhera:
  # Rmax regression (eq. 13 in ERDC TR-08-06): ln(Rmax_km) = intercept + dp2_coeff*Δp² + lat_coeff*ψ + ε
  # Δp in mb, ψ (latitude) in degrees N, Rmax output in km.
  rmax:
    intercept:
      value: 3.015
      units: "dimensionless"
      source: "Vickery & Wadhera (2008), ERDC TR-08-06, eq. (13). Regression on Atlantic basin landfalls. See model/hazard.py."
    dp2_coeff:
      value: -6.291e-5
      units: "1/mb^2"
      source: "[same as vickery_wadhera.rmax.intercept]"
    lat_coeff:
      value: 0.0337
      units: "1/deg"
      source: "[same as vickery_wadhera.rmax.intercept]"
    sigma_low_dp:
      value: 0.448
      units: "dimensionless"
      source: "V&W (2008) ERDC TR-08-06 heteroscedastic σ for ln(Rmax) when Δp ≤ 87 mb."
    sigma_mid_dp_a:
      value: 1.137
      units: "dimensionless"
      source: "V&W (2008) σ = a − b·Δp for 87 < Δp ≤ 120 mb; intercept term."
    sigma_mid_dp_b:
      value: 0.00792
      units: "1/mb"
      source: "V&W (2008) σ = a − b·Δp for 87 < Δp ≤ 120 mb; slope term."
    sigma_high_dp:
      value: 0.186
      units: "dimensionless"
      source: "V&W (2008) σ for ln(Rmax) when Δp > 120 mb."
    dp_break_lo:
      value: 87.0
      units: "mb"
      source: "V&W (2008) σ piecewise lower breakpoint."
    dp_break_hi:
      value: 120.0
      units: "mb"
      source: "V&W (2008) σ piecewise upper breakpoint."
  # Holland B regression (eq. 14 in ERDC TR-08-06): B = intercept + rmax_coeff*Rmax_km + lat_coeff*ψ + ε
  # Rmax_km in km (coupled to rmax equation output), ψ in degrees N. B censored to [b_min, b_max].
  b:
    intercept:
      value: 1.881
      units: "dimensionless"
      source: "Vickery & Wadhera (2008), ERDC TR-08-06, eq. (14). See model/hazard.py."
    rmax_coeff:
      value: -0.00557
      units: "1/km"
      source: "[same as vickery_wadhera.b.intercept]. Negative: compact storms (small Rmax) have higher B."
    lat_coeff:
      value: -0.01295
      units: "1/deg"
      source: "[same as vickery_wadhera.b.intercept]"
    sigma:
      value: 0.221
      units: "dimensionless"
      source: "V&W (2008) B equation residual std."
    b_min:
      value: 0.5
      units: "dimensionless"
      source: "V&W (2008) physical lower bound for Holland B."
    b_max:
      value: 2.5
      units: "dimensionless"
      source: "V&W (2008) physical upper bound for Holland B."

vulnerability:
  gust_factor:
    value: 1.3
    units: "dimensionless"
    source: "HAZUS Exposure C"
  gust_threshold:
    value: 65.0
    units: "mph_gust"
    source: "illustrative (v2)"
  # Per-construction logistic curve: dr(g) = cap / (1 + exp(-k*(g - midpoint)))
  # for g >= gust_threshold; 0 otherwise.  All wind speeds in 3-s peak gust (mph).
  construction_params:
    Manufactured:
      midpoint: {value: 110.0, units: "mph_gust",     source: "HAZUS-anchored (v2)"}
      cap:      {value: 1.00,  units: "fraction",      source: "HAZUS-anchored (v2)"}
      k:        {value: 0.080, units: "per_mph_gust",  source: "HAZUS-anchored (v2)"}
    Wood Frame:
      midpoint: {value: 145.0, units: "mph_gust",     source: "HAZUS-anchored (v2)"}
      cap:      {value: 1.00,  units: "fraction",      source: "HAZUS-anchored (v2)"}
      k:        {value: 0.050, units: "per_mph_gust",  source: "HAZUS-anchored (v2)"}
    Masonry:
      midpoint: {value: 165.0, units: "mph_gust",     source: "HAZUS-anchored (v2)"}
      cap:      {value: 0.90,  units: "fraction",      source: "HAZUS-anchored (v2)"}
      k:        {value: 0.050, units: "per_mph_gust",  source: "HAZUS-anchored (v2)"}
    Reinforced Concrete:
      midpoint: {value: 185.0, units: "mph_gust",     source: "HAZUS-anchored (v2)"}
      cap:      {value: 0.75,  units: "fraction",      source: "HAZUS-anchored (v2)"}
      k:        {value: 0.045, units: "per_mph_gust",  source: "HAZUS-anchored (v2)"}
  method:
    value: "logistic_deterministic"
    units: "label"
    source: "Task 2b. Vulnerability model switch: 'logistic_deterministic' (v2 HAZUS-anchored logistic, production default, bit-identical to pre-2b baseline) | 'damage_state_mean' (5-state DS lognormal fragility, Task 2a calibration). Env-var override: CATMODEL_VULN_METHOD. See model/vulnerability.py."
  ds_gust_threshold:
    value: "on"
    units: "label"
    source: "Task 2b. Sub-switch (damage_state_mean mode only). 'on': apply 65-mph hard cutoff (preserves v2 onset behaviour for DS mode); 'off': let lognormal fragility tails handle onset (quantifies Manufactured AAL delta, Task 2b open decision). Env-var override: CATMODEL_DS_GUST_THRESHOLD. See model/vulnerability.py."
  # ---- Damage uncertainty (Step 3.1) ----
  damage_uncertainty:
    value: "off"
    units: "label"
    source: "Step 3.1. Secondary uncertainty switch: 'off' (default, bit-identical to deterministic baseline) | 'on' (Gaussian copula common-shock Beta damage draws around the mean curve). Env-var: CATMODEL_DAMAGE_UNCERTAINTY."
  damage_cv:
    value: 0.40
    units: "dimensionless"
    source: "Placeholder, order-of-magnitude. CAS reports ~0.30 aggregate severity CV; pointwise damage-ratio CV is larger due to portfolio diversification. NOT calibrated; to be replaced — potentially with an MDR-dependent CV — in v4 when per-event damage data exists. Env-var: CATMODEL_DAMAGE_CV."
  damage_rho:
    value: 0.5
    units: "dimensionless"
    source: "Sensitivity parameter, not calibrated. Common-shock spatial correlation in [0,1]; swept in analysis/sensitivity_secondary.py. Env-var: CATMODEL_DAMAGE_RHO."
  # 5-state damage-state fragility parameters (DS0-DS4).
  # E[DR|g] = sum_{k=1}^{4} delta_lr_k * Phi(ln(g/theta_k)/beta)
  # delta_lr = diff(consequence_loss_ratios[1:]) = [0.02, 0.08, 0.40, 0.50]
  # All wind speeds: 3-s peak gust (mph).
  # Parameters derived in calibration/fragility_thetas.py; see CLAUDE.md Task 2a.
  damage_states:
    consequence_loss_ratios:
      value: [0.0, 0.02, 0.10, 0.50, 1.00]
      units: "fraction"
      source: "HAZUS Hurricane Technical Manual §8.1.4.3 p.8-14; DS0 (none) through DS4 (complete destruction). delta_lr=[0.02,0.08,0.40,0.50] used in kernel. See model/vulnerability.py."
    Manufactured:
      beta:   {value: 0.11,     units: "dimensionless", source: "calibration/fragility_thetas.py; CLAUDE.md Task 2a. Grid search beta in [0.10,0.24] minimising MSE vs v2 logistic over g=linspace(70,220,80)."}
      thetas: {value: [66.7586, 74.5212, 110.0, 122.7906], units: "mph_gust", source: "calibration/fragility_thetas.py; CLAUDE.md Task 2a. DS1-DS4 lognormal medians (3-s peak gust, mph). theta3=v2 midpoint; theta1=88*(midpoint/145); theta2/theta4 Nelder-Mead multistart."}
    Wood Frame:
      beta:   {value: 0.13,     units: "dimensionless", source: "calibration/fragility_thetas.py; CLAUDE.md Task 2a."}
      thetas: {value: [88.0, 100.2169, 145.0, 165.1301], units: "mph_gust", source: "calibration/fragility_thetas.py; CLAUDE.md Task 2a."}
    Masonry:
      beta:   {value: 0.15,     units: "dimensionless", source: "calibration/fragility_thetas.py; CLAUDE.md Task 2a."}
      thetas: {value: [100.1379, 116.3437, 165.0, 191.7027], units: "mph_gust", source: "calibration/fragility_thetas.py; CLAUDE.md Task 2a."}
    Reinforced Concrete:
      beta:   {value: 0.20,     units: "dimensionless", source: "calibration/fragility_thetas.py; CLAUDE.md Task 2a."}
      thetas: {value: [112.2759, 143.6503, 185.0, 226.7991], units: "mph_gust", source: "calibration/fragility_thetas.py; CLAUDE.md Task 2a."}

