# Florida hurricane cat model — v2 calibration parameters
# Every scalar entry carries: value, units, source.
# Derived values (TOP_OF_TOWER, TOTAL_CAPACITY, theoretical_cat3plus, etc.)
# are computed in code — never hardcode them here.

simulation:
  n_years:
    value: 100000
    units: "simulated_years"
    source: "design choice (v2)"
  seed:
    value: 42
    units: "dimensionless"
    source: "design choice (v2)"

frequency:
  lambda_rate:
    value: 0.6576
    units: "events/year"
    source: "Poisson GLM (log link), single covariate: standardized AMO (TNA dropped due to collinearity r=0.892, dAIC=1.99 favoring reduced model), 1966-2022 satellite era; current-climate value = exp(b0 + b_amo*AMO_curr) evaluated at 2013-2022 mean climate. HURDAT2 + NOAA PSL AMO unsmoothed. See calibration/frequency_glm.py."
  # Satellite-era Poisson MLE -- documentary benchmark, not consumed by the model.
  lambda_mle_benchmark:
    value: 0.4746
    units: "events/year"
    source: "Poisson MLE, FL HU landfalls 1966-2024 (satellite era), HURDAT2. Documentary benchmark only -- NOT consumed by model/hazard.py. Production rate is frequency.lambda_rate (GLM current-climate). See calibration/frequency_glm.py."
  # Saffir-Simpson sustained wind ranges (mph, 1-minute average) for Cat 1-5.
  category_ranges:
    value: [[74, 95], [96, 110], [111, 129], [130, 156], [157, 185]]
    units: "mph_sustained"
    source: "Saffir-Simpson"
  # Superseded by intensity.vmax_kt truncated-lognormal (Step 1.4); retained for reference only.
  category_weights:
    value: [0.40, 0.25, 0.18, 0.13, 0.04]
    units: "probability"
    source: "superseded by intensity.vmax_kt truncated-lognormal (Step 1.4); retained for reference only, not used in sampling"

intensity:
  distribution:
    value: "trunclognorm"
    units: "scipy_dist_name"
    source: "MLE Truncated Lognormal fit to FL HU landfall Vmax, HURDAT2 full record 1851-2024 (n=112); selected over Shifted Weibull on upper-tail QQ MAD (1.49 kt vs 1.81 kt), dAIC=-2.30. Full record used for intensity (tail events scarce; pre-satellite Vmax measurement bias non-directional) vs satellite era for frequency (count detection bias). See calibration/intensity.py."
  loc:
    value: 64.0
    units: "kt"
    source: "HU definitional threshold (Saffir-Simpson 64 kt)"
  mu_log:
    value: 4.4362
    units: "log_kt"
    source: "MLE Truncated Lognormal fit to FL HU landfall Vmax, HURDAT2 full record 1851-2024 (n=112); selected over Shifted Weibull on upper-tail QQ MAD (1.49 kt vs 1.81 kt), dAIC=-2.30. Full record used for intensity (tail events scarce; pre-satellite Vmax measurement bias non-directional) vs satellite era for frequency (count detection bias). See calibration/intensity.py."
  sigma_log:
    value: 0.2518
    units: "dimensionless"
    source: "MLE Truncated Lognormal fit to FL HU landfall Vmax, HURDAT2 full record 1851-2024 (n=112); selected over Shifted Weibull on upper-tail QQ MAD (1.49 kt vs 1.81 kt), dAIC=-2.30. Full record used for intensity (tail events scarce; pre-satellite Vmax measurement bias non-directional) vs satellite era for frequency (count detection bias). See calibration/intensity.py."

wind_pressure:
  p_env_mb:
    value: 1013.0
    units: "mb"
    source: "standard atmosphere ambient pressure; static input — edit to match regional climatology if needed"
  a:
    value: 0.0158
    units: "mb / mph^b"
    source: "Log-linear OLS (np.polyfit, multiplicative-error model) on CONUS satellite-era HU landfalls (HURDAT2 1966-2024, n=85 records with non-null pmin_mb). WPR is basin physics, not portfolio-specific — restricting to Florida would be a specification error. Satellite-era cut (>=1966) breaks Dvorak circularity: pre-satellite Vmax was partly derived from pressure via the Dvorak technique, making a Vmax-pressure regression on that data circular. Unit chain: vmax_kt * 1.15078 = vmax_mph; delta_p = p_env_mb - pmin_mb (mb). See calibration/wind_pressure.py."
  b:
    value: 1.7222
    units: "dimensionless"
    source: "Log-linear OLS (np.polyfit, multiplicative-error model) on CONUS satellite-era HU landfalls (HURDAT2 1966-2024, n=85 records with non-null pmin_mb). WPR is basin physics, not portfolio-specific — restricting to Florida would be a specification error. Satellite-era cut (>=1966) breaks Dvorak circularity: pre-satellite Vmax was partly derived from pressure via the Dvorak technique, making a Vmax-pressure regression on that data circular. Unit chain: vmax_kt * 1.15078 = vmax_mph; delta_p = p_env_mb - pmin_mb (mb). See calibration/wind_pressure.py."
  sigma_log:
    value: 0.2458
    units: "dimensionless"
    source: "Log-linear OLS (np.polyfit, multiplicative-error model) on CONUS satellite-era HU landfalls (HURDAT2 1966-2024, n=85 records with non-null pmin_mb). WPR is basin physics, not portfolio-specific — restricting to Florida would be a specification error. Satellite-era cut (>=1966) breaks Dvorak circularity: pre-satellite Vmax was partly derived from pressure via the Dvorak technique, making a Vmax-pressure regression on that data circular. Unit chain: vmax_kt * 1.15078 = vmax_mph; delta_p = p_env_mb - pmin_mb (mb). See calibration/wind_pressure.py."
  sample_n:
    value: 85
    units: "count"
    source: "Log-linear OLS (np.polyfit, multiplicative-error model) on CONUS satellite-era HU landfalls (HURDAT2 1966-2024, n=85 records with non-null pmin_mb). WPR is basin physics, not portfolio-specific — restricting to Florida would be a specification error. Satellite-era cut (>=1966) breaks Dvorak circularity: pre-satellite Vmax was partly derived from pressure via the Dvorak technique, making a Vmax-pressure regression on that data circular. Unit chain: vmax_kt * 1.15078 = vmax_mph; delta_p = p_env_mb - pmin_mb (mb). See calibration/wind_pressure.py."

hazard:
  # FL coastline polyline — [lat_deg, lon_deg] for each vertex.
  # Ordered: Atlantic N->S, Keys, Gulf S->N.  12 points = 11 segments.
  coast_polyline:
    value:
      - [28.5, -80.60]   #  0  Atlantic N
      - [27.5, -80.30]   #  1
      - [26.7, -80.03]   #  2
      - [26.1, -80.10]   #  3  Miami metro (SE high-risk)
      - [25.6, -80.12]   #  4
      - [25.1, -80.45]   #  5  Keys start
      - [24.7, -81.10]   #  6  Keys tip
      - [25.9, -81.40]   #  7  Gulf SW -- Collier/Lee (SW high-risk)
      - [26.5, -82.00]   #  8
      - [27.3, -82.55]   #  9
      - [27.8, -82.75]   # 10
      - [28.2, -82.75]   # 11  Gulf N
    units: "[lat_deg, lon_deg]"
    source: "superseded by hazard.landfall_geography KDE (Step 1.5); retained only for the __main__ reference plot in hazard.py"
  # 11 weights for 11 segments.  Coupled to coast_polyline: must have len-1 entries.
  # Higher weights on SE (segments 2-3) and SW (segments 7-8) to reflect
  # observed FL landfall climatology.
  coast_segment_weights:
    value: [1.0, 1.5, 2.5, 3.0, 1.5, 1.0, 1.0, 2.5, 2.0, 1.5, 1.0]
    units: "relative_weight"
    source: "superseded by hazard.landfall_geography KDE (Step 1.5); no longer used in sampling"
  step_km:
    value: 30.0
    units: "km"
    source: "design choice (v2)"
  efold_km:
    value: 120.0
    units: "km"
    source: "illustrative (v2)"
  # Exponent for the outer-vortex power-law decay: V = Vmax*(Rmax/d)^exponent for d>Rmax.
  outer_decay_exponent:
    value: 0.6
    units: "dimensionless"
    source: "illustrative (v2)"
  # Radius of maximum winds uniform sampling bounds (constant along track, no eyewall contraction).
  rmax_km_min:
    value: 30.0
    units: "km"
    source: "illustrative (v2)"
  rmax_km_max:
    value: 55.0
    units: "km"
    source: "illustrative (v2)"

  landfall_geography:
    coastline_path:
      value: "data/processed/fl_coastline_simplified.csv"
      units: "file_path"
      source: "TIGER/Line 2023 FL state boundary; forward arc GA-FL Atlantic corner -> Keys (embedded in mainland ring) -> AL-FL panhandle corner; 5 km Douglas-Peucker simplification (EPSG:3086). See calibration/landfall_geography.py."
    simplify_tolerance_m:
      value: 5000
      units: "m"
      source: "1/10 of minimum HU wind radius (50 km); eliminates TIGER sub-km digitization noise while preserving all macroscale geographic features relevant to landfall geography."
    n_vertices_raw:
      value: 8232
      units: "count"
      source: "TIGER/Line 2023 FL mainland exterior ring coastal arc (GA-FL to AL-FL, includes Keys); before simplification"
    n_vertices_simplified:
      value: 61
      units: "count"
      source: "After Douglas-Peucker 5 km simplification in EPSG:3086"
    total_arc_length_km:
      value: 2247.75
      units: "km"
      source: "EPSG:3086 arc-length of simplified coastline"
    endpoint_start:
      value: [-81.469687, 30.712350]
      units: "[lon_deg, lat_deg]"
      source: "GA-FL Atlantic border, NE Florida; s=0 reference"
    endpoint_end:
      value: [-87.598998, 30.996298]
      units: "[lon_deg, lat_deg]"
      source: "AL-FL panhandle border; s=L reference"
    keys_handling:
      value: "Keys embedded in mainland exterior ring; no separate polygon insertion. Forward arc from GA corner through Atlantic-S, Keys (min lat 24.3963°N), Gulf-N to AL corner — 8232 raw vertices."
      units: "text"
      source: "calibration/landfall_geography.py"
    kde_bandwidth_silverman_km:
      value: 240.869
      units: "km"
      source: "Silverman rule: h = 1.06 * std(s) * n^(-1/5), n=112 HU landfalls"
    kde_silverman_factor:
      value: 0.412234
      units: "dimensionless"
      source: "scipy gaussian_kde bw_method factor; actual_bw_km = factor * std(s_km)"
    n_HU:
      value: 112
      units: "count"
      source: "HURDAT2 fl_landfalls.csv, status==HU, full record 1851-2024"
    s_samples_km:
      value: [1950.775, 917.909, 1456.901, 1799.327, 1970.280, 1419.541, 917.909, 1071.658, 1673.246, 1187.391, 454.451, 443.517, 1605.579, 1813.411, 1266.117, 1581.223, 875.323, 2124.537, 1928.730, 1508.183, 713.711, 311.181, 1549.433, 2067.403, 1642.766, 1729.999, 1881.873, 1484.123, 2040.440, 587.035, 1607.245, 632.714, 1230.237, 1954.257, 2029.369, 1599.545, 1808.257, 1807.097, 1875.744, 651.198, 769.789, 767.287, 766.297, 917.909, 2104.323, 273.191, 1877.435, 2115.388, 2059.458, 917.909, 1447.328, 1898.708, 1175.484, 280.092, 616.112, 426.948, 486.749, 689.296, 441.433, 469.986, 726.002, 573.353, 2029.115, 1975.766, 622.927, 917.909, 1530.804, 649.596, 1372.356, 550.202, 1097.493, 1112.275, 783.993, 497.686, 1566.598, 623.800, 2000.704, 1292.028, 2053.203, 735.007, 592.779, 104.675, 1136.531, 682.627, 917.909, 917.909, 1526.854, 2005.252, 462.341, 1920.846, 874.085, 620.109, 2078.841, 2088.714, 1956.411, 837.011, 1068.835, 1263.126, 431.299, 429.762, 2075.230, 917.909, 1175.944, 1771.554, 805.032, 1928.730, 1290.601, 382.669, 1691.707, 1673.072, 1705.436, 1372.961]
      units: "km"
      source: "Arc-length projection of 112 HU landfalls onto simplified FL coastline, EPSG:3086; s=0 at GA-FL Atlantic corner (NE Florida)"

  track_stats:
    heading_mean_deg:
      value: 3.23
      units: "degrees_clockwise_from_N"
      source: "Circular mean of FL HU landfall headings via mean resultant vector: atan2(mean_sin, mean_cos) mod 360. See calibration/track_stats.py."
    heading_arithmetic_mean_deg:
      value: 147.5
      units: "degrees_clockwise_from_N"
      source: "Naive arithmetic mean of headings; differs from circular mean when distribution spans the 0/360 wrap. Stored for transparency only."
    heading_circ_std_deg:
      value: 53.45
      units: "degrees"
      source: "Circular std: sqrt(-2*ln(R)) in radians converted to degrees; R = heading_resultant_R."
    heading_resultant_R:
      value: 0.6472
      units: "dimensionless"
      source: "Mean resultant length sqrt(mean_cos^2 + mean_sin^2); 0 = uniform, 1 = all identical."
    speed_dist:
      value: "gamma"
      units: "scipy_dist_name"
      source: "MLE fit to FL HU landfall translation speeds; selected by AIC over lognormal and gamma (both floc=0). See calibration/track_stats.py."
    speed_params:
      value: [4.957188, 0.000000, 4.761344]
      units: "scipy_gamma_params_(shape_s,_loc,_scale)"
      source: "MLE params; reconstruct with scipy.stats.gamma(*speed_params). Units of scale are km/h."
    speed_mean_kmh:
      value: 23.603
      units: "km/h"
      source: "Sample mean of bracketing-pair translation speeds at FL HU landfall."
    speed_std_kmh:
      value: 10.558
      units: "km/h"
      source: "Sample std (ddof=1) of bracketing-pair translation speeds."
    n_HU:
      value: 112
      units: "count"
      source: "HURDAT2 fl_landfalls.csv, status==HU, full record 1851-2024"
    n_used:
      value: 112
      units: "count"
      source: "Storms with a valid bracketing fix pair; n_HU - n_excluded."
    n_excluded:
      value: 0
      units: "count"
      source: "Storms excluded: no bracketing pair or degenerate dt=0. See calibration/track_stats.py output."

    by_regime:
      # Cape Sable (25.12N 81.10W) projected onto simplified FL coastline.
      # s < s_cut -> atlantic (includes Keys); s >= s_cut -> gulf.
      # Keys are atlantic-side: the polyline dips south through the Keys
      # before returning north to Cape Sable, so all Keys arc-lengths < s_cut.
      s_cut_km:
        value: 1057.43
        units: "km"
        source: "Cape Sable (25.12N 81.10W) projected onto simplified FL coastline; scaled to EPSG:3086 arc-length for direct comparison with s_samples_km. See calibration/track_stats.py."
      s_cut_frac:
        value: 0.4704
        units: "dimensionless"
        source: "s_cut_km / total_arc_length_km"
      atlantic:
        n:
          value: 47
          units: "count"
          source: "HU landfalls s < s_cut_km (Atlantic coast + Keys). Keys classified atlantic: arc-length dips south through Keys before Cape Sable."
        heading_mean_deg:
          value: 314.46
          units: "degrees_clockwise_from_N"
          source: "Circular mean, atlantic regime (expected: NW sector ~300-340 deg). See calibration/track_stats.py."
        heading_circ_std_deg:
          value: 45.17
          units: "degrees"
          source: "Circular std, atlantic regime."
        heading_resultant_R:
          value: 0.7328
          units: "dimensionless"
          source: "Mean resultant length, atlantic regime."
        speed_dist:
          value: "gamma"
          units: "scipy_dist_name"
          source: "MLE fit, atlantic regime. See calibration/track_stats.py."
        speed_params:
          value: [6.393271, 0.000000, 3.157488]
          units: "scipy_gamma_params_(shape_s,_loc,_scale)"
          source: "MLE params; scipy.stats.gamma(*speed_params). Scale in km/h."
        speed_mean_kmh:
          value: 20.187
          units: "km/h"
          source: "Sample mean, atlantic regime."
        speed_std_kmh:
          value: 7.666
          units: "km/h"
          source: "Sample std (ddof=1), atlantic regime."
      gulf:
        n:
          value: 65
          units: "count"
          source: "HU landfalls s >= s_cut_km (Gulf coast + panhandle, SW FL northward)."
        heading_mean_deg:
          value: 30.72
          units: "degrees_clockwise_from_N"
          source: "Circular mean, gulf regime (expected: NE sector ~20-60 deg). See calibration/track_stats.py."
        heading_circ_std_deg:
          value: 31.06
          units: "degrees"
          source: "Circular std, gulf regime."
        heading_resultant_R:
          value: 0.8634
          units: "dimensionless"
          source: "Mean resultant length, gulf regime."
        speed_dist:
          value: "gamma"
          units: "scipy_dist_name"
          source: "MLE fit, gulf regime. See calibration/track_stats.py."
        speed_params:
          value: [4.786641, 0.000000, 5.447044]
          units: "scipy_gamma_params_(shape_s,_loc,_scale)"
          source: "MLE params; scipy.stats.gamma(*speed_params). Scale in km/h."
        speed_mean_kmh:
          value: 26.073
          units: "km/h"
          source: "Sample mean, gulf regime."
        speed_std_kmh:
          value: 11.675
          units: "km/h"
          source: "Sample std (ddof=1), gulf regime."

vulnerability:
  gust_factor:
    value: 1.3
    units: "dimensionless"
    source: "HAZUS Exposure C"
  gust_threshold:
    value: 65.0
    units: "mph_gust"
    source: "illustrative (v2)"
  # Per-construction logistic curve: dr(g) = cap / (1 + exp(-k*(g - midpoint)))
  # for g >= gust_threshold; 0 otherwise.  All wind speeds in 3-s peak gust (mph).
  construction_params:
    Manufactured:
      midpoint: {value: 110.0, units: "mph_gust",     source: "HAZUS-anchored (v2)"}
      cap:      {value: 1.00,  units: "fraction",      source: "HAZUS-anchored (v2)"}
      k:        {value: 0.080, units: "per_mph_gust",  source: "HAZUS-anchored (v2)"}
    Wood Frame:
      midpoint: {value: 145.0, units: "mph_gust",     source: "HAZUS-anchored (v2)"}
      cap:      {value: 1.00,  units: "fraction",      source: "HAZUS-anchored (v2)"}
      k:        {value: 0.050, units: "per_mph_gust",  source: "HAZUS-anchored (v2)"}
    Masonry:
      midpoint: {value: 165.0, units: "mph_gust",     source: "HAZUS-anchored (v2)"}
      cap:      {value: 0.90,  units: "fraction",      source: "HAZUS-anchored (v2)"}
      k:        {value: 0.050, units: "per_mph_gust",  source: "HAZUS-anchored (v2)"}
    Reinforced Concrete:
      midpoint: {value: 185.0, units: "mph_gust",     source: "HAZUS-anchored (v2)"}
      cap:      {value: 0.75,  units: "fraction",      source: "HAZUS-anchored (v2)"}
      k:        {value: 0.045, units: "per_mph_gust",  source: "HAZUS-anchored (v2)"}

reinsurance:
  # Per-occurrence XoL layers.  TOTAL_CAPACITY and TOP_OF_TOWER are derived in code.
  layers:
    - name:       {value: "Layer 1", units: "label", source: "design choice (v2)"}
      attachment: {value: 60000000,  units: "USD",   source: "illustrative (v2)"}
      limit:      {value: 40000000,  units: "USD",   source: "illustrative (v2)"}
    - name:       {value: "Layer 2", units: "label", source: "design choice (v2)"}
      attachment: {value: 100000000, units: "USD",   source: "illustrative (v2)"}
      limit:      {value: 50000000,  units: "USD",   source: "illustrative (v2)"}
    - name:       {value: "Layer 3", units: "label", source: "design choice (v2)"}
      attachment: {value: 150000000, units: "USD",   source: "illustrative (v2)"}
      limit:      {value: 50000000,  units: "USD",   source: "illustrative (v2)"}
