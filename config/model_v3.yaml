# Florida hurricane cat model — v2 calibration parameters
# Every scalar entry carries: value, units, source.
# Derived values (TOP_OF_TOWER, TOTAL_CAPACITY, theoretical_cat3plus, etc.)
# are computed in code — never hardcode them here.

simulation:
  n_years:
    value: 100000
    units: "simulated_years"
    source: "design choice (v2)"
  seed:
    value: 42
    units: "dimensionless"
    source: "design choice (v2)"

frequency:
  lambda_rate:
    value: 0.6576
    units: "events/year"
    source: "Poisson GLM (log link), single covariate: standardized AMO (TNA dropped due to collinearity r=0.892, dAIC=1.99 favoring reduced model), 1966-2022 satellite era; current-climate value = exp(b0 + b_amo*AMO_curr) evaluated at 2013-2022 mean climate. HURDAT2 + NOAA PSL AMO unsmoothed. See calibration/frequency_glm.py."
  # Satellite-era Poisson MLE -- documentary benchmark, not consumed by the model.
  lambda_mle_benchmark:
    value: 0.4746
    units: "events/year"
    source: "Poisson MLE, FL HU landfalls 1966-2024 (satellite era), HURDAT2. Documentary benchmark only -- NOT consumed by model/hazard.py. Production rate is frequency.lambda_rate (GLM current-climate). See calibration/frequency_glm.py."
  # Saffir-Simpson sustained wind ranges (mph, 1-minute average) for Cat 1-5.
  category_ranges:
    value: [[74, 95], [96, 110], [111, 129], [130, 156], [157, 185]]
    units: "mph_sustained"
    source: "Saffir-Simpson"
  # Superseded by intensity.vmax_kt truncated-lognormal (Step 1.4); retained for reference only.
  category_weights:
    value: [0.40, 0.25, 0.18, 0.13, 0.04]
    units: "probability"
    source: "superseded by intensity.vmax_kt truncated-lognormal (Step 1.4); retained for reference only, not used in sampling"

intensity:
  distribution:
    value: "trunclognorm"
    units: "scipy_dist_name"
    source: "MLE Truncated Lognormal fit to FL HU landfall Vmax, HURDAT2 full record 1851-2024 (n=112); selected over Shifted Weibull on upper-tail QQ MAD (1.49 kt vs 1.81 kt), dAIC=-2.30. Full record used for intensity (tail events scarce; pre-satellite Vmax measurement bias non-directional) vs satellite era for frequency (count detection bias). See calibration/intensity.py."
  loc:
    value: 64.0
    units: "kt"
    source: "HU definitional threshold (Saffir-Simpson 64 kt)"
  mu_log:
    value: 4.4362
    units: "log_kt"
    source: "MLE Truncated Lognormal fit to FL HU landfall Vmax, HURDAT2 full record 1851-2024 (n=112); selected over Shifted Weibull on upper-tail QQ MAD (1.49 kt vs 1.81 kt), dAIC=-2.30. Full record used for intensity (tail events scarce; pre-satellite Vmax measurement bias non-directional) vs satellite era for frequency (count detection bias). See calibration/intensity.py."
  sigma_log:
    value: 0.2518
    units: "dimensionless"
    source: "MLE Truncated Lognormal fit to FL HU landfall Vmax, HURDAT2 full record 1851-2024 (n=112); selected over Shifted Weibull on upper-tail QQ MAD (1.49 kt vs 1.81 kt), dAIC=-2.30. Full record used for intensity (tail events scarce; pre-satellite Vmax measurement bias non-directional) vs satellite era for frequency (count detection bias). See calibration/intensity.py."
  cap_kt:
    value: 165.0
    units: "kt"
    source: "Step 3.0a. Empirical Atlantic MPI at SST ~30 C per DeMaria & Kaplan (1994), 'Sea surface temperature and the maximum intensity of Atlantic tropical cyclones', J. Climate 7, 1324-1334: V = A + B*exp(C*(T-30)), A=28.2 m/s, B=55.8 m/s, C=0.1813 /C -> ~163 kt at 30 C, rounded to 165 kt. Cross-check: HURDAT2 Atlantic landfall record is 160 kt (Labor Day 1935, Dorian 2019); cap sits 5 kt above the observed record as a physical ceiling, not a data ceiling. Active when hazard.physics.intensity_cap='on'."

wind_pressure:
  p_env_mb:
    value: 1013.0
    units: "mb"
    source: "standard atmosphere ambient pressure; static input — edit to match regional climatology if needed"
  a:
    value: 0.0158
    units: "mb / mph^b"
    source: "Log-linear OLS (np.polyfit, multiplicative-error model) on CONUS satellite-era HU landfalls (HURDAT2 1966-2024, n=85 records with non-null pmin_mb). WPR is basin physics, not portfolio-specific — restricting to Florida would be a specification error. Satellite-era cut (>=1966) breaks Dvorak circularity: pre-satellite Vmax was partly derived from pressure via the Dvorak technique, making a Vmax-pressure regression on that data circular. Unit chain: vmax_kt * 1.15078 = vmax_mph; delta_p = p_env_mb - pmin_mb (mb). See calibration/wind_pressure.py."
  b:
    value: 1.7222
    units: "dimensionless"
    source: "Log-linear OLS (np.polyfit, multiplicative-error model) on CONUS satellite-era HU landfalls (HURDAT2 1966-2024, n=85 records with non-null pmin_mb). WPR is basin physics, not portfolio-specific — restricting to Florida would be a specification error. Satellite-era cut (>=1966) breaks Dvorak circularity: pre-satellite Vmax was partly derived from pressure via the Dvorak technique, making a Vmax-pressure regression on that data circular. Unit chain: vmax_kt * 1.15078 = vmax_mph; delta_p = p_env_mb - pmin_mb (mb). See calibration/wind_pressure.py."
  sigma_log:
    value: 0.2458
    units: "dimensionless"
    source: "Log-linear OLS (np.polyfit, multiplicative-error model) on CONUS satellite-era HU landfalls (HURDAT2 1966-2024, n=85 records with non-null pmin_mb). WPR is basin physics, not portfolio-specific — restricting to Florida would be a specification error. Satellite-era cut (>=1966) breaks Dvorak circularity: pre-satellite Vmax was partly derived from pressure via the Dvorak technique, making a Vmax-pressure regression on that data circular. Unit chain: vmax_kt * 1.15078 = vmax_mph; delta_p = p_env_mb - pmin_mb (mb). See calibration/wind_pressure.py."
  sample_n:
    value: 85
    units: "count"
    source: "Log-linear OLS (np.polyfit, multiplicative-error model) on CONUS satellite-era HU landfalls (HURDAT2 1966-2024, n=85 records with non-null pmin_mb). WPR is basin physics, not portfolio-specific — restricting to Florida would be a specification error. Satellite-era cut (>=1966) breaks Dvorak circularity: pre-satellite Vmax was partly derived from pressure via the Dvorak technique, making a Vmax-pressure regression on that data circular. Unit chain: vmax_kt * 1.15078 = vmax_mph; delta_p = p_env_mb - pmin_mb (mb). See calibration/wind_pressure.py."

hazard:
  # FL coastline polyline — [lat_deg, lon_deg] for each vertex.
  # Ordered: Atlantic N->S, Keys, Gulf S->N.  12 points = 11 segments.
  coast_polyline:
    value:
      - [28.5, -80.60]   #  0  Atlantic N
      - [27.5, -80.30]   #  1
      - [26.7, -80.03]   #  2
      - [26.1, -80.10]   #  3  Miami metro (SE high-risk)
      - [25.6, -80.12]   #  4
      - [25.1, -80.45]   #  5  Keys start
      - [24.7, -81.10]   #  6  Keys tip
      - [25.9, -81.40]   #  7  Gulf SW -- Collier/Lee (SW high-risk)
      - [26.5, -82.00]   #  8
      - [27.3, -82.55]   #  9
      - [27.8, -82.75]   # 10
      - [28.2, -82.75]   # 11  Gulf N
    units: "[lat_deg, lon_deg]"
    source: "superseded by hazard.landfall_geography KDE (Step 1.5); retained only for the __main__ reference plot in hazard.py"
  # 11 weights for 11 segments.  Coupled to coast_polyline: must have len-1 entries.
  # Higher weights on SE (segments 2-3) and SW (segments 7-8) to reflect
  # observed FL landfall climatology.
  coast_segment_weights:
    value: [1.0, 1.5, 2.5, 3.0, 1.5, 1.0, 1.0, 2.5, 2.0, 1.5, 1.0]
    units: "relative_weight"
    source: "superseded by hazard.landfall_geography KDE (Step 1.5); no longer used in sampling"
  step_km:
    value: 30.0
    units: "km"
    source: "design choice (v2)"
  efold_km:
    value: 120.0
    units: "km"
    source: "illustrative (v2)"
  # Exponent for the outer-vortex power-law decay: V = Vmax*(Rmax/d)^exponent for d>Rmax.
  outer_decay_exponent:
    value: 0.6
    units: "dimensionless"
    source: "illustrative (v2)"
  # Radius of maximum winds uniform sampling bounds (constant along track, no eyewall contraction).
  rmax_km_min:
    value: 30.0
    units: "km"
    source: "illustrative (v2)"
  rmax_km_max:
    value: 55.0
    units: "km"
    source: "illustrative (v2)"
  rmax_floor_km:
    value: 8.0
    units: "km"
    source: "Step 3.0c. Physical lower limit on V&W Rmax sampling from the Vickery & Wadhera (2008) ERDC TR-08-06 observed Atlantic TC record: no observed tropical cyclone has Rmax < ~8 km. V&W eq. (13) extrapolates to sub-physical Rmax at high Δp (amplified by wpr_residual at cap-level storms; 153/100k storms under wpr=on, 4/100k under wpr=off). Floor applied as simple censoring (clip) after _vw_rmax_sample and before _vw_b_sample, so Holland B couples to the physical Rmax. Active when hazard.physics.rmax_floor='on'."

