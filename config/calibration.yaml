# Calibration inputs — data sources and paths for v3 hazard calibration.
# Every scalar entry carries: value, units, source.

hurdat2:
  raw_path:
    value: "data/raw/hurdat2-1851-2025-02272026.txt"
    units: "file_path"
    source: "NOAA/NHC download 2026-06-11"
  processed_path:
    value: "data/processed/hurdat2_fixes.parquet"
    units: "file_path"
    source: "generated by calibration/parse_hurdat2.py"
  missing_sentinel:
    value: -999
    units: "dimensionless"
    source: "HURDAT2 format specification"

fl_landfalls:
  processed_path:
    value: "data/processed/fl_landfalls.csv"
    units: "file_path"
    source: "generated by calibration/filter_fl_landfalls.py"
  map_path:
    value: "outputs/fl_landfall_map.png"
    units: "file_path"
    source: "generated by calibration/filter_fl_landfalls.py"

frequency_calibration:
  figure_path:
    value: "outputs/frequency_calibration.png"
    units: "file_path"
    source: "generated by calibration/frequency.py"

frequency_glm:
  tna_url:
    value: "https://psl.noaa.gov/data/correlation/tna.long.data"
    units: "url"
    source: "NOAA PSL Tropical North Atlantic SST index (5.5-23.5N, 15-57.5W); used as MDR SST proxy — ersst.long.data no longer hosted at PSL"
  amo_url:
    value: "https://psl.noaa.gov/data/correlation/amon.us.long.data"
    units: "url"
    source: "NOAA PSL AMO unsmoothed monthly index (data through 2023)"
  current_climate_years:
    value: 10
    units: "years"
    source: "climate conditioning window — last N years preceding calibration"
  figure_path:
    value: "outputs/frequency_glm.png"
    units: "file_path"
    source: "generated by calibration/frequency_glm.py"

intensity_calibration:
  figure_path:
    value: "outputs/intensity_calibration.png"
    units: "file_path"
    source: "generated by calibration/intensity.py"
