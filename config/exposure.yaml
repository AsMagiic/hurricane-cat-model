# Synthetic FL portfolio exposure parameters (v2)
# Every scalar entry carries: value, units, source.

n_locations:
  value: 1000
  units: "count"
  source: "design choice (v2)"

seed:
  value: 42
  units: "dimensionless"
  source: "design choice (v2)"

target_tiv:
  value: 500000000
  units: "USD"
  source: "design choice (v2)"

tiv_cv:
  value: 1.0
  units: "dimensionless"
  source: "design choice (v2)"

counties:
  value:
    - "Miami-Dade"
    - "Broward"
    - "Palm Beach"
    - "Lee"
    - "Pinellas"
    - "Hillsborough"
    - "Collier"
    - "Monroe"
  units: "county names"
  source: "illustrative (v2)"

county_weights:
  value: [0.22, 0.16, 0.14, 0.10, 0.10, 0.10, 0.09, 0.09]
  units: "probability"
  source: "illustrative (v2)"

# [lat_deg, lon_deg] centroid for each county — used as origin of the Normal jitter.
county_centroids:
  value:
    Miami-Dade:    [25.61, -80.40]
    Broward:       [26.15, -80.30]
    Palm Beach:    [26.65, -80.20]
    Lee:           [26.55, -81.90]
    Pinellas:      [27.90, -82.70]
    Hillsborough:  [27.95, -82.30]
    Collier:       [26.10, -81.60]
    Monroe:        [24.80, -81.00]
  units: "[lat_deg, lon_deg]"
  source: "illustrative (v2)"

occupancy:
  choices:
    value: ["Single Family", "Condo", "Mobile Home"]
    units: "category labels"
    source: "design choice (v2)"
  weights:
    value: [0.68, 0.22, 0.10]
    units: "probability"
    source: "illustrative (v2)"

construction:
  # Mobile Home -> always Manufactured (rule stays in code).
  # These types and weights apply to all other occupancies.
  non_manufactured_types:
    value: ["Wood Frame", "Masonry", "Reinforced Concrete"]
    units: "category labels"
    source: "design choice (v2)"
  weights:
    value: [0.25, 0.55, 0.20]
    units: "probability"
    source: "illustrative (v2)"

deductibles:
  choices:
    value: [0.02, 0.05, 0.10]
    units: "fraction_of_tiv"
    source: "illustrative (v2)"
  weights:
    value: [0.30, 0.50, 0.20]
    units: "probability"
    source: "illustrative (v2)"
